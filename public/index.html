<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta de Proyecto IA</title>
</head>
<body>
    <h2>Envía tu Propuesta de Proyecto de IA</h2>
    <form action="/api/submit" method="POST">
        <label for="proposal">Describe tu proyecto (mínimo 10 palabras):</label><br>
        <textarea id="proposal" name="proposal" rows="5" cols="50" required></textarea><br><br>
        <button type="submit">Enviar Propuesta</button>
    </form>
</body>
</html>
